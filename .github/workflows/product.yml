name: Product

on:
  push:
    tags: [ 'v*.*.*' ]
    branches: [master]      
  pull_request:
    branches: [master]
  workflow_dispatch: # manual triggering, for debugging purposes

permissions:
  contents: write

jobs:
  build-all:
    name: Build All
    runs-on: ubuntu-latest

    steps:
      - name: Checkout RailSL
        uses: actions/checkout@v4
        with:
          path: railsl

      - name: Checkout Kieler Semantics
        uses: actions/checkout@v4
        with:
          repository: kieler/semantics
          path: semantics

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('.github/workflows/*.*', '**/pom.xml', '**/META-INF/MANIFEST.MF', 'build/de.cau.cs.kieler.semantics.targetplatform/de.cau.cs.kieler.semantics.targetplatform.target') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Semantics Updatesite
        working-directory: semantics
        run:
          mvn --update-snapshots --fail-at-end clean package -P semantics.product --file build/pom.xml
        env:
          MAVEN_OPTS: '-Xmx2048M'
      
      - name: Build RailSL Products
        working-directory: railsl
        run:
          mvn --update-snapshots --fail-at-end clean package -P rail.product --file build/pom.xml
        env:
          MAVEN_OPTS: '-Xmx2048M'

      - name: Archive RailSL RCA Linux
        uses: actions/upload-artifact@v4
        with:
          name: RailSL Linux
          path: railsl/build/product/target/products/railway_rca_*-linux.gtk.x86_64.tar.gz
          if-no-files-found: error

      - name: Archive RailSL RCA Linux Arm64
        uses: actions/upload-artifact@v4
        with:
          name: RailSL Linux ARM64
          path: railsl/build/product/target/products/railway_rca_*-linux.gtk.aarch64.tar.gz
          if-no-files-found: error

      - name: Archive RailSL Compiler CLI Jar
        uses: actions/upload-artifact@v4
        with:
          name: RailSL Compiler CLI Jar
          path: railsl/build/cli/target/exe/kico-railsl.jar
          if-no-files-found: error

      - name: Attach Release Artifacts
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            railsl/build/product/target/products/railway_rca_*-linux.gtk.x86_64.tar.gz
            railsl/build/product/target/products/railway_rca_*-linux.gtk.aarch64.tar.gz
            railsl/build/cli/target/exe/kico-railsl.jar
